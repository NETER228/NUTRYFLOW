<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NutriFlow - Сброс пароля</title>
    <link rel="icon" type="image/png" href="https://bowbokskvpwlpkggswao.supabase.co/storage/v1/object/public/image/favico.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .reset-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 2rem;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        
        .reset-container h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #1a1a2e;
        }
        
        .reset-container h1 i {
            color: #2a7de1;
            margin-right: 0.5rem;
        }
        
        .reset-container p {
            color: #666;
            margin-bottom: 2rem;
        }
        
        .reset-form {
            text-align: left;
        }
        
        .reset-form label {
            font-weight: 500;
            margin: 0.75rem 0 0.25rem;
            color: #4a5568;
            display: block;
        }
        
        .reset-form input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .reset-form input:focus {
            outline: none;
            border-color: #2a7de1;
            box-shadow: 0 0 0 3px rgba(42, 125, 225, 0.1);
        }
        
        .btn-reset {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.75rem;
            background: linear-gradient(135deg, #2a7de1, #1c5eb0);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(42, 125, 225, 0.4);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #2a7de1;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.75rem;
        }
        
        .strength-weak { color: #dc3545; }
        .strength-medium { color: #fd7e14; }
        .strength-strong { color: #28a745; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://bowbokskvpwlpkggswao.supabase.co/storage/v1/object/public/image/LOGO2.png" alt="NutriFlow">
        </div>
        <nav>
            <button class="btn btn-outline" onclick="location.href='login.html'"><i class="fas fa-arrow-left"></i> Назад</button>
        </nav>
    </header>

    <div class="reset-container">
        <h1><i class="fas fa-lock"></i> Создание нового пароля</h1>
        <p>Введите новый пароль для вашей учетной записи</p>
        
        <div id="resetAlert" class="alert" style="display: none;"></div>
        
        <form id="resetForm" class="reset-form">
            <label><i class="fas fa-lock"></i> Новый пароль</label>
            <input type="password" id="newPassword" placeholder="Минимум 6 символов" required>
            <div id="passwordStrength" class="password-strength"></div>
            
            <label><i class="fas fa-check-circle"></i> Подтвердите пароль</label>
            <input type="password" id="confirmPassword" placeholder="Повторите пароль" required>
            
            <button type="submit" class="btn-reset" id="resetBtn">
                <i class="fas fa-save"></i> Сохранить новый пароль
            </button>
        </form>
        
        <a href="login.html" class="back-link"><i class="fas fa-chevron-left"></i> Вернуться ко входу</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://bowbokskvpwlpkggswao.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvd2Jva3NrdnB3bHBrZ2dzd2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODcyODUsImV4cCI6MjA4OTI2MzI4NX0.s3GrEoE84ECDdH6wlX7ECfh2itVfL4w4o8DdqL4LFoA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function checkPasswordStrength(password) {
            if (password.length < 6) return { strength: 'weak', text: 'Слишком короткий (мин. 6 символов)' };
            if (password.length < 8) return { strength: 'weak', text: 'Слабый' };
            if (/[A-Z]/.test(password) && /[0-9]/.test(password) && password.length >= 8) {
                return { strength: 'strong', text: 'Надежный' };
            }
            if (password.length >= 8) return { strength: 'medium', text: 'Средний' };
            return { strength: 'weak', text: 'Слабый' };
        }

        const newPassword = document.getElementById('newPassword');
        const strengthDiv = document.getElementById('passwordStrength');
        
        newPassword.addEventListener('input', () => {
            const result = checkPasswordStrength(newPassword.value);
            strengthDiv.innerHTML = `<span class="strength-${result.strength}">🔒 ${result.text}</span>`;
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');
            const alertDiv = document.getElementById('resetAlert');
            
            alertDiv.style.display = 'none';
            
            if (newPassword.length < 6) {
                alertDiv.className = 'alert error';
                alertDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Пароль должен быть не менее 6 символов';
                alertDiv.style.display = 'block';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                alertDiv.className = 'alert error';
                alertDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Пароли не совпадают';
                alertDiv.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Сохранение...';
            
            try {
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (sessionError || !session) {
                    throw new Error('Недействительная ссылка для сброса пароля');
                }
                
                const { error: updateError } = await supabase.auth.updateUser({
                    password: newPassword
                });
                
                if (updateError) throw updateError;
                
                alertDiv.className = 'alert success';
                alertDiv.innerHTML = '<i class="fas fa-check-circle"></i> Пароль успешно изменен! Перенаправление...';
                alertDiv.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                alertDiv.className = 'alert error';
                alertDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + 
                    (error.message || 'Ошибка при сбросе пароля');
                alertDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Сохранить новый пароль';
            }
        });
        
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                const alertDiv = document.getElementById('resetAlert');
                alertDiv.className = 'alert error';
                alertDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Недействительная ссылка. <a href="forgot-password.html">Запросите новую</a>';
                alertDiv.style.display = 'block';
                document.getElementById('resetBtn').disabled = true;
            }
        }
        
        checkSession();
    </script>
</body>
</html>
