<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NutriFlow - Спортзалы рядом</title>
    <link rel="icon" type="image/png" href="https://bowbokskvpwlpkggswao.supabase.co/storage/v1/object/public/image/favico.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Подключение 2ГИС API -->
    <script src="https://maps.api.2gis.ru/2.0/loader.js?pkg=full"></script>
    <style>
        .gyms-hero {
            text-align: center;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, #2a7de1, #6b4eff);
            color: white;
        }
        .gyms-hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: white;
            background: none;
        }
        .gyms-hero p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .map-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .map-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .map-header {
            padding: 1.5rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .map-header h2 {
            font-size: 1.3rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .location-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .location-btn {
            background: linear-gradient(135deg, #2a7de1, #1c5eb0);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .location-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(42, 125, 225, 0.3);
        }
        .location-btn.outline {
            background: transparent;
            border: 1px solid #2a7de1;
            color: #2a7de1;
        }
        .location-btn.outline:hover {
            background: #2a7de1;
            color: white;
        }
        .search-box {
            display: flex;
            gap: 0.5rem;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 0.3rem 0.3rem 0.3rem 1rem;
        }
        .search-box input {
            border: none;
            padding: 0.5rem;
            width: 200px;
            font-size: 0.9rem;
            outline: none;
        }
        .search-box button {
            background: #2a7de1;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            color: white;
            cursor: pointer;
        }
        #map {
            width: 100%;
            height: 500px;
        }
        .gyms-list {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .gyms-list h3 {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .gyms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        .gym-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            cursor: pointer;
        }
        .gym-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(42, 125, 225, 0.15);
        }
        .gym-card h4 {
            font-size: 1.2rem;
            margin-bottom: 0.75rem;
            color: #1a1a2e;
        }
        .gym-card p {
            color: #666;
            font-size: 0.9rem;
            margin: 0.5rem 0;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        .gym-card p i {
            min-width: 20px;
            margin-top: 2px;
            color: #2a7de1;
        }
        .gym-card .address {
            color: #2a7de1;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid #eef2f6;
        }
        .gym-badge {
            display: inline-block;
            background: #e8f0fe;
            color: #2a7de1;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-right: 0.5rem;
        }
        .distance-badge {
            background: #28a745;
            color: white;
        }
        .location-status {
            font-size: 0.8rem;
            color: #666;
            padding: 0.5rem 1rem;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
        .city-name {
            font-weight: bold;
            color: #2a7de1;
        }
        @media (max-width: 768px) {
            .map-header {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                width: 100%;
            }
            .search-box input {
                flex: 1;
            }
            #map {
                height: 400px;
            }
            .gyms-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div id="header-placeholder"></div>

<section class="gyms-hero">
    <h1><i class="fas fa-dumbbell"></i> Спортзалы рядом</h1>
    <p>Найдите ближайшие фитнес-клубы и тренажерные залы в вашем городе</p>
</section>

<div class="map-container">
    <div class="map-card">
        <div class="map-header">
            <h2><i class="fas fa-map-marker-alt"></i> Карта спортзалов</h2>
            <div class="location-controls">
                <div class="search-box">
                    <input type="text" id="citySearch" placeholder="Введите город...">
                    <button id="searchCityBtn"><i class="fas fa-search"></i></button>
                </div>
                <button id="refreshLocationBtn" class="location-btn"><i class="fas fa-location-dot"></i> Моё местоположение</button>
                <button id="resetMapBtn" class="location-btn outline"><i class="fas fa-globe"></i> Сброс</button>
            </div>
        </div>
        <div id="map"></div>
        <div id="locationStatus" class="location-status">
            <i class="fas fa-spinner fa-spin"></i> Определение местоположения...
        </div>
    </div>
</div>

<div class="gyms-list">
    <h3><i class="fas fa-list"></i> Спортзалы <span id="cityNameDisplay"></span></h3>
    <div id="gymsGrid" class="gyms-grid">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> Загрузка спортзалов...</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bowbokskvpwlpkggswao.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvd2Jva3NrdnB3bHBrZ2dzd2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODcyODUsImV4cCI6MjA4OTI2MzI4NX0.s3GrEoE84ECDdH6wlX7ECfh2itVfL4w4o8DdqL4LFoA';

    const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
    if (!currentUser) window.location.href = 'index.html';

    // ========== ВАШ API-КЛЮЧ 2ГИС ==========
    const DG_API_KEY = '2e0fda04-8be1-4dc5-8d08-eb825936fff9';  // ← ВСТАВЬТЕ ВАШ КЛЮЧ

    let map;
    let markers = [];
    let currentGyms = [];
    let userLocation = null;
    let currentCity = null;

    // Поисковый запрос для спортзалов
    const SEARCH_QUERY = 'фитнес клуб тренажерный зал';

    // Инициализация карты
    function initMap(centerLat = 55.7558, centerLng = 37.6176, zoom = 12) {
        if (map) return;
        
        DG.then(() => {
            map = DG.map('map', {
                center: [centerLat, centerLng],
                zoom: zoom,
                key: DG_API_KEY
            });
        });
    }

    // Определение города по координатам (обратное геокодирование)
    async function getCityFromCoords(lat, lng) {
        try {
            const url = `https://catalog.api.2gis.ru/3.0/items/geocode?point=${lng},${lat}&fields=items.name&key=${DG_API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.result && data.result.items && data.result.items.length > 0) {
                // Ищем город в результатах
                for (let item of data.result.items) {
                    if (item.type === 'city' || item.subtype === 'city' || item.name) {
                        return item.name;
                    }
                }
                // Если не нашли город, берем первый населенный пункт
                if (data.result.items[0].name) {
                    return data.result.items[0].name;
                }
            }
            return null;
        } catch (error) {
            console.error('Ошибка определения города:', error);
            return null;
        }
    }

    // Поиск спортзалов в городе
    async function searchGymsInCity(cityName, userLat = null, userLng = null) {
        const statusDiv = document.getElementById('locationStatus');
        const grid = document.getElementById('gymsGrid');
        const cityDisplay = document.getElementById('cityNameDisplay');
        
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Поиск спортзалов в городе ' + cityName + '...';
        grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Загрузка спортзалов...</div>';
        cityDisplay.innerHTML = `в городе <span class="city-name">${cityName}</span>`;
        
        try {
            // Сначала получаем координаты города
            const geocodeUrl = `https://catalog.api.2gis.ru/3.0/items/geocode?q=${encodeURIComponent(cityName)}&key=${DG_API_KEY}`;
            const geocodeResponse = await fetch(geocodeUrl);
            const geocodeData = await geocodeResponse.json();
            
            if (!geocodeData.result || !geocodeData.result.items || geocodeData.result.items.length === 0) {
                throw new Error('Город не найден');
            }
            
            const cityPoint = geocodeData.result.items[0].point;
            const cityLat = cityPoint.lat;
            const cityLng = cityPoint.lon;
            
            // Ищем спортзалы в радиусе 15 км от центра города
            const searchUrl = `https://catalog.api.2gis.ru/3.0/items?q=${encodeURIComponent(SEARCH_QUERY)}&point=${cityLng},${cityLat}&radius=15000&sort=distance&fields=items.point,items.name,items.address,items.address_name,items.contact_groups,items.schedule,items.external_content&key=${DG_API_KEY}`;
            
            const response = await fetch(searchUrl);
            const data = await response.json();
            
            if (data.result && data.result.items && data.result.items.length > 0) {
                currentGyms = data.result.items.map(item => ({
                    id: item.id,
                    name: item.name,
                    address: item.address_name || item.address || 'адрес не указан',
                    lat: item.point.lat,
                    lng: item.point.lon,
                    phone: extractPhone(item.contact_groups),
                    schedule: extractSchedule(item.schedule)
                }));
                
                // Если есть координаты пользователя, добавляем расстояние
                if (userLat && userLng) {
                    currentGyms = currentGyms.map(gym => ({
                        ...gym,
                        distance: getDistance(userLat, userLng, gym.lat, gym.lng)
                    }));
                    // Сортируем по расстоянию
                    currentGyms.sort((a, b) => a.distance - b.distance);
                }
                
                statusDiv.innerHTML = `<i class="fas fa-check-circle" style="color: #28a745;"></i> Найдено ${currentGyms.length} спортивных объектов в городе ${cityName}`;
                loadMarkersOnMap();
                renderGymsList(userLat, userLng);
            } else {
                statusDiv.innerHTML = `<i class="fas fa-info-circle" style="color: #fd7e14;"></i> Спортзалы не найдены в городе ${cityName}`;
                grid.innerHTML = '<div class="loading">🏋️ Спортзалы не найдены в этом городе</div>';
            }
        } catch (error) {
            console.error('Ошибка поиска:', error);
            statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #dc3545;"></i> Ошибка загрузки спортзалов в городе ${cityName}`;
            grid.innerHTML = '<div class="loading">⚠️ Ошибка загрузки данных</div>';
        }
    }

    // Извлечение телефона
    function extractPhone(contactGroups) {
        if (!contactGroups) return 'не указан';
        for (let group of contactGroups) {
            if (group.contacts) {
                for (let contact of group.contacts) {
                    if (contact.type === 'phone' && contact.value) {
                        return contact.value;
                    }
                }
            }
        }
        return 'не указан';
    }

    // Извлечение графика работы
    function extractSchedule(schedule) {
        if (!schedule) return 'информация отсутствует';
        
        if (Array.isArray(schedule) && schedule.length > 0) {
            const today = new Date().getDay();
            const days = ['воскресенье', 'понедельник', 'вторник', 'среда', 'четверг', 'пятница', 'суббота'];
            const todayName = days[today];
            
            for (let day of schedule) {
                if (day.name && day.name.toLowerCase().includes(todayName)) {
                    if (day.work_hours && day.work_hours.length > 0) {
                        return `${todayName}: ${day.work_hours[0].from || '?'} - ${day.work_hours[0].to || '?'}`;
                    }
                }
            }
            
            for (let day of schedule) {
                if (day.work_hours && day.work_hours.length > 0) {
                    return `${day.name}: ${day.work_hours[0].from || '?'} - ${day.work_hours[0].to || '?'}`;
                }
            }
        }
        
        if (typeof schedule === 'string' && schedule.trim()) {
            return schedule;
        }
        
        return 'информация отсутствует';
    }

    // Расчет расстояния (формула Гаверсинуса)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI / 180;
        const φ2 = lat2 * Math.PI / 180;
        const Δφ = (lat2 - lat1) * Math.PI / 180;
        const Δλ = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                  Math.cos(φ1) * Math.cos(φ2) *
                  Math.sin(Δλ/2) * Math.sin(Δλ/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // Загрузка маркеров на карту
    function loadMarkersOnMap() {
        if (!map) return;
        
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        
        currentGyms.forEach(gym => {
            const marker = DG.marker([gym.lat, gym.lng])
                .addTo(map)
                .bindPopup(`
                    <div style="max-width: 250px;">
                        <b>${gym.name}</b><br>
                        📍 ${gym.address}<br>
                        📞 ${gym.phone}<br>
                        🕐 ${gym.schedule}<br>
                        ${gym.distance ? `📏 ${Math.round(gym.distance)} м от вас<br>` : ''}
                        <a href="https://yandex.ru/maps/?text=${encodeURIComponent(gym.address)}" target="_blank">🗺️ Построить маршрут</a>
                    </div>
                `);
            markers.push(marker);
        });
        
        if (currentGyms.length > 0 && currentGyms.length < 100) {
            const bounds = [];
            currentGyms.forEach(gym => bounds.push([gym.lat, gym.lng]));
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }
    }

    // Отображение списка спортзалов
    function renderGymsList(userLat, userLng) {
        const grid = document.getElementById('gymsGrid');
        
        if (currentGyms.length === 0) {
            grid.innerHTML = '<div class="loading">🏋️ Спортзалы не найдены</div>';
            return;
        }
        
        grid.innerHTML = currentGyms.map(gym => `
            <div class="gym-card" onclick="focusOnGym(${gym.lat}, ${gym.lng})">
                <h4><i class="fas fa-dumbbell"></i> ${gym.name}</h4>
                <p><i class="fas fa-location-dot"></i> ${gym.address}</p>
                <p><i class="fas fa-phone"></i> ${gym.phone}</p>
                <p><i class="fas fa-clock"></i> ${gym.schedule}</p>
                ${gym.distance ? `<div class="gym-badge distance-badge"><i class="fas fa-map-marker-alt"></i> ${Math.round(gym.distance)} м от вас</div>` : ''}
                <div class="address">
                    <i class="fas fa-map-pin"></i> <a href="https://yandex.ru/maps/?text=${encodeURIComponent(gym.address)}" target="_blank">Построить маршрут</a>
                </div>
            </div>
        `).join('');
    }

    // Фокусировка на спортзале
    function focusOnGym(lat, lng) {
        if (map) {
            map.setView([lat, lng], 17);
        }
    }

    // Определение местоположения и поиск спортзалов в городе
    function getCurrentLocation() {
        const statusDiv = document.getElementById('locationStatus');
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Определение местоположения...';
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    userLocation = { lat, lng };
                    
                    statusDiv.innerHTML = `<i class="fas fa-check-circle" style="color: #28a745;"></i> Местоположение определено`;
                    
                    if (map) {
                        map.setView([lat, lng], 13);
                        if (window.userMarker) map.removeLayer(window.userMarker);
                        window.userMarker = DG.marker([lat, lng])
                            .addTo(map)
                            .bindPopup('📍 Вы здесь');
                    }
                    
                    // Определяем город по координатам
                    statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Определение города...';
                    const cityName = await getCityFromCoords(lat, lng);
                    
                    if (cityName) {
                        currentCity = cityName;
                        statusDiv.innerHTML = `<i class="fas fa-check-circle" style="color: #28a745;"></i> Ваш город: ${cityName}`;
                        await searchGymsInCity(cityName, lat, lng);
                    } else {
                        statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #fd7e14;"></i> Не удалось определить город, поиск по Москве`;
                        await searchGymsInCity('Москва', lat, lng);
                    }
                },
                (error) => {
                    let errorMessage = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage = 'Доступ к геолокации запрещен. Поиск по Москве.';
                            break;
                        default:
                            errorMessage = 'Не удалось определить местоположение. Поиск по Москве.';
                    }
                    statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #fd7e14;"></i> ${errorMessage}`;
                    searchGymsInCity('Москва');
                    if (map) map.setView([55.7558, 37.6176], 12);
                }
            );
        } else {
            statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle" style="color: #fd7e14;"></i> Геолокация не поддерживается. Поиск по Москве.';
            searchGymsInCity('Москва');
        }
    }

    // Поиск города по названию
    async function searchCity(cityName) {
        if (!cityName) return;
        await searchGymsInCity(cityName);
        if (map) {
            // Центрируем карту на городе
            const geocodeUrl = `https://catalog.api.2gis.ru/3.0/items/geocode?q=${encodeURIComponent(cityName)}&key=${DG_API_KEY}`;
            const response = await fetch(geocodeUrl);
            const data = await response.json();
            if (data.result && data.result.items && data.result.items.length > 0) {
                const point = data.result.items[0].point;
                map.setView([point.lat, point.lon], 12);
            }
        }
    }

    // Сброс карты
    function resetMap() {
        if (userLocation) {
            map.setView([userLocation.lat, userLocation.lng], 13);
        } else {
            map.setView([55.7558, 37.6176], 12);
        }
    }

    // Обработчики событий
    document.addEventListener('DOMContentLoaded', () => {
        initMap();
        setTimeout(() => {
            getCurrentLocation();
        }, 500);
        
        document.getElementById('refreshLocationBtn').addEventListener('click', getCurrentLocation);
        document.getElementById('searchCityBtn').addEventListener('click', () => {
            const city = document.getElementById('citySearch').value.trim();
            if (city) searchCity(city);
        });
        document.getElementById('resetMapBtn').addEventListener('click', resetMap);
        document.getElementById('citySearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const city = document.getElementById('citySearch').value.trim();
                if (city) searchCity(city);
            }
        });
    });
    
    window.focusOnGym = focusOnGym;
</script>
<script src="load-header.js"></script>
<script src="load-footer.js"></script>
</body>
</html>
